      </div>

      <!-- Row 4: Exercise Headers -->
      <div class="grid-row bold">

      <div class="grid-row">
        <input readonly value="MTri Kiks"><input readonly value="TGPOG P12"><input value="X" class="span-2"><input value="X" class="span-2"><input value="X" class="span-2"><input class="span-2"><input class="span-2"><input class="span-2"><input class="span-2">

      <div class="grid-row">
        <input readonly value="DBC Fly 8s"><input readonly value="MR Fly"><input value="X" class="span-2"><input value="X" class="span-2"><input value="X" class="span-2"><input class="span-2"><input class="span-2"><input class="span-2"><input class="span-2">

      </div>

      <div class="info-section">

      </div>

      <!-- <div class="info-section">
        <h3>Comments</h3>
        <textarea placeholder="Other comments..." class="info-textarea"></textarea>
      </div> -->

    <div class="button-group">
