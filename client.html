<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Workout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header with Logo -->
  <div class="header">
    <div class="header-content">
      <div class="logo-section">
        <img src="images/TEC_logo.svg" alt="The Exercise Coach" class="logo" />
      </div>
      <h1 class="header-title">Coach Dashboard</h1>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h2 id="clientName">Client Name</h2>
      <p class="subtitle">Update workout information and save progress</p>
    </div>

    <!-- 
      MVP NOTE:
      This table mirrors a paper workout chart.
      Inputs make it editable.
    -->
    <table class="workout-chart">
      <thead>
        <tr>
          <th>Exercise</th>
          <th>Sets</th>
          <th>Reps</th>
          <th>Weight</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        <!-- Simple fixed rows for MVP -->
        <tr>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
        </tr>
        <tr>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
        </tr>
        <tr>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
          <td><input /></td>
        </tr>
      </tbody>
    </table>

    <div class="button-group">
      <a href="clients.html" class="btn-secondary">Back to Clients</a>
      <button id="saveWorkout" class="btn-primary">Save Workout</button>
    </div>

    <p id="saveStatus" class="save-status"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
